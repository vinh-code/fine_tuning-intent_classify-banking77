# Training configuration — Kaggle T4 GPU
# Model: Llama-3.2-3B-Instruct (4-bit) — fast & efficient for intent classification

model:
  name: "unsloth/Llama-3.2-3B-Instruct-bnb-4bit"           # 3B params, ~4-5GB VRAM
  max_seq_length: 768                                        # Full prompt ~515 tokens, 768 an toàn
  load_in_4bit: true                                         # QLoRA: 4-bit base + float16 adapters

lora:
  r: 32                       # Higher rank = more capacity = better accuracy
  lora_alpha: 32              # Equal to r is standard practice
  lora_dropout: 0             # Unsloth optimized: keep 0
  bias: "none"
  target_modules:             # Cover all projection layers for max quality
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 8    # 3B model nhẹ, tăng batch để tận dụng GPU tối đa
  gradient_accumulation_steps: 2    # Effective batch = 8 x 2 = 16 (giữ nguyên)
  num_train_epochs: 5              
  learning_rate: 2e-4              
  warmup_ratio: 0.05               # 5% warmup of total steps
  weight_decay: 0.01
  optimizer: "adamw_8bit"          # 8-bit Adam: essential for 8B on T4
  lr_scheduler_type: "cosine"      # Cosine decay for smoother convergence
  logging_steps: 10
  save_strategy: "epoch"             # Lưu checkpoint mỗi epoch
  eval_strategy: "epoch"             # Đánh giá validation mỗi epoch
  load_best_model_at_end: true       # Giữ lại model tốt nhất trên val set
  metric_for_best_model: "eval_loss" # Dùng val_loss để chọn model tốt nhất
  output_dir: "outputs"

data:
  train_path: "sample_data/train.csv"
  val_path: "sample_data/val.csv"
  test_path: "sample_data/test.csv"
  label_map_path: "sample_data/label_map.json"
  val_size: 0.1                              # 10% of train → validation
  random_seed: 42

checkpoint:
  save_path: "model_checkpoint"
  early_stopping_patience: 2                 # Dừng sớm nếu val_loss không giảm sau 2 epochs
