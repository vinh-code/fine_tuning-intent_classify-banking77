# Inference configuration
# model_path passed to IntentClassification.__init__() should point to this file.

model:
  checkpoint_path: "model_checkpoint"   # Path to the saved LoRA/PEFT checkpoint folder
  max_seq_length: 1024                  # Must match training max_seq_length
  load_in_4bit: true                    # Keep 4-bit for memory efficiency

data:
  label_map_path: "sample_data/label_map.json"  # JSON with id2label / label2id mappings

generation:
  max_new_tokens: 15      # Intent names are short (~3-5 tokens)
  do_sample: false        # Greedy decoding for deterministic output
  repetition_penalty: 1.1
